changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - github-actions
  categories:
    - title: "🚀 Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Fixes"
      labels:
        - bug
        - fix
    - title: "🧰 Maintenance"
      labels:
        - chore
        - refactor
        - docs
