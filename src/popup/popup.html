<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title data-i18n="popupTitle">Translate Racall</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h1 data-i18n="popupHeading">Original Text Preprocess</h1>

  <script src="popup.js"></script>
